[package]
name        = "lex-mcp"
version     = "0.1.0"
lex         = "0.9.7"
description = "MCP (Model Context Protocol) stdio server — bridges lex-agent Skills to MCP JSON-RPC."
license     = "EUPL-1.2"

[dependencies]
lex-schema = { git = "https://github.com/alpibrusl/lex-schema" }
lex-agent  = { git = "https://github.com/alpibrusl/lex-agent" }
# Already in the transitive closure (via lex-agent); declared directly so the
# examples — which build Capabilities with `lex-spec/capability` — resolve and run.
lex-spec   = { git = "https://github.com/alpibrusl/lex-spec" }
